<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>تحدي ضياء — كأس العالم 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A1628;color:#E8E8E8;font-family:-apple-system,Segoe UI,Arial,sans-serif;direction:rtl;min-height:100vh}
#hdr{background:linear-gradient(180deg,#0D1F3E,#0A1628);border-bottom:2px solid #C9A84C;padding:10px 14px;text-align:center;position:sticky;top:0;z-index:200}
.htitle{font-size:17px;font-weight:900;color:#C9A84C}
.hsub{font-size:10px;color:#8899AA;margin-top:2px}
.hrow{display:flex;align-items:center;justify-content:center;gap:10px}
#banner{background:#060C18;border-bottom:1px solid #1A2540;padding:7px 14px;display:flex;justify-content:space-around;align-items:center;text-align:center}
.bv{font-size:19px;font-weight:900;color:#C9A84C}
.bl{font-size:9px;color:#556;margin-top:1px}
#tabs{display:flex;background:#0D1F3E;border-bottom:1px solid #1E3050;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:9px 12px;font-size:11px;font-weight:700;border:none;background:none;color:#556;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;font-family:inherit;flex-shrink:0;-webkit-appearance:none}
.tab.active{color:#C9A84C;border-bottom-color:#C9A84C}
.tab.done{color:#4CAF50}
#nbar{font-size:11px;text-align:center;padding:5px 10px;display:none;align-items:center;justify-content:center;gap:6px}
#nbar.syncing{display:flex;background:#0D1F3E;color:#C9A84C}
#nbar.ok{display:flex;background:#081808;color:#4CAF50}
#nbar.err{display:flex;background:#180808;color:#ff6b6b}
#wrap{padding:12px;max-width:600px;margin:0 auto;padding-bottom:40px}
.card{background:#0D1F3E;border-radius:10px;border:1px solid #1E3050;margin-bottom:10px;overflow:hidden}
.chd{background:linear-gradient(90deg,#1A2B40,#152238);padding:9px 12px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.cbd{padding:12px}
.mc{background:#060C18;border:1px solid #141E30;border-radius:8px;margin-bottom:5px;overflow:hidden}
.mc.picked{border-color:#163025}
.mhd{padding:3px 10px;font-size:9px;color:#2A3A50;background:#040810;border-bottom:1px solid #0C1420;display:flex;justify-content:space-between;align-items:center}
.mrow{display:flex}
.ts{flex:1;display:flex;align-items:center;gap:5px;padding:9px 8px;cursor:pointer;border:none;background:none;font-family:inherit;color:#999;font-size:12px;min-width:0;-webkit-appearance:none}
.ts.W{background:#081E12;color:#C9A84C;font-weight:700}
.ts.L{opacity:.35}
.ts.dis{cursor:default;pointer-events:none}
.tflag{font-size:16px;flex-shrink:0}
.tname{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tchk{font-size:10px;color:#C9A84C;flex-shrink:0}
.vs{width:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:#1E2E40;background:#040810;font-weight:700}
.rtag{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700}
.rtok{background:#0A2518;color:#4CAF50}
.rthalf{background:#1A1500;color:#FFD700}
.rtno{background:#200808;color:#ff6b6b}
.arow{padding:3px 10px;font-size:10px;color:#ff6b6b;background:#160808;border-top:1px solid #1A0808}
.btn{display:block;width:100%;padding:11px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:14px;margin-bottom:6px;background:#1A2B40;color:#fff;font-family:inherit;text-align:center;-webkit-appearance:none}
.btng{background:linear-gradient(135deg,#C9A84C,#F0D060);color:#0A1628}
.btngrn{background:linear-gradient(135deg,#1A6B1A,#2EA02E);color:#fff}
.btnred{background:#6B1A1A;color:#fff}
.btnsync{background:linear-gradient(135deg,#1A3B6B,#2E5FA0);color:#fff}
.pcircle{width:68px;height:68px;border-radius:50%;border:2px dashed #2A3F5A;background:#060C18;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;flex-shrink:0;cursor:pointer}
.pcircle img{width:100%;height:100%;object-fit:cover}
.pcircle input[type=file]{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
input[type=text]{width:100%;background:#060C18;border:1px solid #2A3F5A;border-radius:8px;color:#E8E8E8;padding:9px 11px;font-size:14px;outline:none;font-family:inherit;margin-bottom:8px;-webkit-appearance:none}
.lbl{font-size:11px;color:#8899AA;margin-bottom:4px;display:block}
.lkbanner{background:#081808;border:1px solid #1E3E1E;border-radius:8px;padding:9px 12px;font-size:12px;color:#4CAF50;margin-bottom:10px}
.infobox{background:#060C18;border:1px solid #1E3050;border-radius:8px;padding:10px 12px;font-size:12px;color:#8899AA;line-height:1.9;margin-bottom:10px}
.scorecard{background:linear-gradient(135deg,#081808,#0A0A20);border:2px solid #C9A84C;border-radius:12px;padding:18px;text-align:center;margin-bottom:10px}
.bigs{font-size:54px;font-weight:900;color:#C9A84C;line-height:1}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid #C9A84C44;border-top-color:#C9A84C;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
/* Leaderboard */
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #131F33}
.lb-row:last-child{border-bottom:none}
.lb-rank{width:24px;text-align:center;font-weight:900;font-size:13px;color:#556;flex-shrink:0}
.lb-rank.gold{color:#FFD700}
.lb-rank.silver{color:#C0C0C0}
.lb-rank.bronze{color:#CD7F32}
.lb-avatar{width:34px;height:34px;border-radius:50%;background:#1A2B40;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;object-fit:cover}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-champ{font-size:10px;color:#667}
.lb-pts{font-size:18px;font-weight:900;color:#C9A84C;flex-shrink:0}
.lb-correct{font-size:9px;color:#4CAF50;text-align:left}
</style>
</head>
<body>
<div id="hdr">
  <div class="htitle">⚽ تحدي ضياء — كأس العالم 2026</div>
  <div class="hsub">الأدوار الإقصائية · 32 فريق</div>
</div>
<div id="banner">
  <div><div class="bv" id="bnPts">0</div><div class="bl">نقاطي</div></div>
  <div><div class="bv" id="bnCor" style="font-size:14px">0/0</div><div class="bl">صح/مكتمل</div></div>
  <div><div class="bv" id="bnChamp" style="font-size:12px">؟</div><div class="bl">بطلي</div></div>
</div>
<div id="tabs"></div>
<div id="nbar"></div>
<div id="wrap"></div>

<script src="app.js"></script>
</body>
</html>
